<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CV Screener — AI Recruitment Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #00e5a0;
    --accent2: #005f43;
    --warn: #ff6b35;
    --warn2: #3a1a0f;
    --text: #e8e8f0;
    --muted: #6a6a80;
    --score-high: #00e5a0;
    --score-mid: #f0b429;
    --score-low: #ff6b35;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

  /* Header */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 48px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo-area h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 5vw, 42px);
    letter-spacing: -1px;
    line-height: 1;
    color: var(--text);
  }

  .logo-area h1 span { color: var(--accent); }
  .logo-area p { color: var(--muted); font-size: 12px; margin-top: 8px; letter-spacing: 2px; text-transform: uppercase; }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 16px;
    font-size: 12px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }

  .status-dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .status-dot.offline { background: var(--warn); box-shadow: 0 0 8px var(--warn); }

  /* Main Layout */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 32px;
  }

  @media (max-width: 720px) { .main-grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
  }

  .panel-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 16px;
    resize: vertical;
    min-height: 180px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.7;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  /* File Upload */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(0,229,160,0.04);
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon { font-size: 36px; margin-bottom: 12px; }
  .upload-zone p { color: var(--muted); font-size: 13px; }
  .upload-zone strong { color: var(--accent); }

  .file-list { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }

  .file-chip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
  }

  .file-chip-name { display: flex; align-items: center; gap: 8px; }
  .file-ext {
    background: var(--accent2);
    color: var(--accent);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .file-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 4px; }
  .file-remove:hover { color: var(--warn); }

  /* Controls Row */
  .controls-row {
    display: flex;
    gap: 16px;
    align-items: flex-end;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .control-group { display: flex; flex-direction: column; gap: 8px; }
  .control-group label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

  select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 12px 16px;
    border-radius: 10px;
    outline: none;
    cursor: pointer;
    min-width: 180px;
  }

  select:focus { border-color: var(--accent); }

  .threshold-display {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

input[type="range"] {
  -webkit-appearance: none;  /* Chrome, Safari */
  appearance: none;          /* Standard — removes the warning */
  width: 140px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(0,229,160,0.5);
  }

  .threshold-val {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--accent);
    min-width: 44px;
  }

  .run-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 14px 32px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }

  .run-btn:hover { background: #00ffb3; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,229,160,0.3); }
  .run-btn:active { transform: translateY(0); }
  .run-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Progress */
  .progress-bar-wrap {
    display: none;
    margin-bottom: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }

  .progress-bar-wrap.visible { display: block; }

  .progress-label { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .progress-bar-track { background: var(--surface2); border-radius: 100px; height: 6px; overflow: hidden; }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #00b8ff);
    border-radius: 100px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Results */
  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .results-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 20px;
  }

  .stats-row { display: flex; gap: 12px; flex-wrap: wrap; }

  .stat-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 12px;
    border: 1px solid;
  }

  .stat-chip.accepted { background: rgba(0,229,160,0.1); border-color: rgba(0,229,160,0.3); color: var(--accent); }
  .stat-chip.rejected { background: rgba(255,107,53,0.1); border-color: rgba(255,107,53,0.3); color: var(--warn); }
  .stat-chip.total { background: var(--surface2); border-color: var(--border); color: var(--text); }

  .filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; }

  .tab {
    padding: 8px 20px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 500; }
  .tab:not(.active):hover { border-color: var(--accent); color: var(--text); }

  /* Result Cards */
  .result-cards { display: flex; flex-direction: column; gap: 16px; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
    animation: cardIn 0.4s ease forwards;
    opacity: 0;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card.accepted { border-left: 3px solid var(--accent); }
  .result-card.rejected { border-left: 3px solid var(--warn); }
  .result-card.error { border-left: 3px solid var(--muted); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    cursor: pointer;
    user-select: none;
  }

  .card-header:hover { background: rgba(255,255,255,0.02); }

  .card-left { display: flex; align-items: center; gap: 16px; }

  .score-ring {
    position: relative;
    width: 56px;
    height: 56px;
    flex-shrink: 0;
  }

  .score-ring svg { transform: rotate(-90deg); }
  .score-ring circle { fill: none; stroke-width: 4; }
  .score-ring .bg { stroke: var(--surface2); }
  .score-ring .fill { stroke-linecap: round; transition: stroke-dashoffset 0.8s ease; }
  .score-number {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
  }

  .card-info h3 { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .card-info p { font-size: 11px; color: var(--muted); }

  .card-right { display: flex; align-items: center; gap: 12px; }

  .status-badge {
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .status-badge.accepted { background: rgba(0,229,160,0.15); color: var(--accent); }
  .status-badge.rejected { background: rgba(255,107,53,0.15); color: var(--warn); }

  .chevron { color: var(--muted); transition: transform 0.3s; font-size: 18px; }
  .result-card.open .chevron { transform: rotate(180deg); }

  /* Card Body */
  .card-body { display: none; padding: 0 24px 24px; border-top: 1px solid var(--border); }
  .result-card.open .card-body { display: block; }

  .body-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 20px;
  }

  @media (max-width: 600px) { .body-grid { grid-template-columns: 1fr; } }


/* Keep only this: */
.body-section h4 {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

  .match-bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .match-bar-label { font-size: 12px; color: var(--muted); width: 100px; flex-shrink: 0; }
  .match-bar-track { flex: 1; background: var(--surface2); border-radius: 100px; height: 6px; overflow: hidden; }
  .match-bar-fill { height: 100%; border-radius: 100px; transition: width 0.6s ease; }
  .match-bar-val { font-size: 12px; color: var(--text); width: 32px; text-align: right; flex-shrink: 0; }

  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }

  .tag {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    border: 1px solid;
  }

  .tag.strength { background: rgba(0,229,160,0.08); border-color: rgba(0,229,160,0.25); color: var(--accent); }
  .tag.gap { background: rgba(255,107,53,0.08); border-color: rgba(255,107,53,0.25); color: var(--warn); }

  .summary-box {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
    margin-top: 16px;
  }

  .section-text {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
    max-height: 120px;
    overflow-y: auto;
    white-space: pre-wrap;
  }

  /* Empty / Error states */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    display: none;
  }

  .empty-state.visible { display: block; }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state p { color: var(--muted); font-size: 14px; }

  .error-banner {
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.3);
    border-radius: 12px;
    padding: 16px 20px;
    color: var(--warn);
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
  }

  .error-banner.visible { display: block; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo-area">
      <h1>CV <span>Screener</span></h1>
      <p>AI-powered recruitment · Ollama local model</p>
    </div>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Checking Ollama...</span>
    </div>
  </header>

  <!-- Input Panels -->
  <div class="main-grid">
    <div class="panel">
      <div class="panel-label">01 — Job Requirements</div>
      <textarea id="requirements" placeholder="Paste the job requirements here...

Example:
We are looking for a Python Backend Developer with:
- 3+ years Python experience
- FastAPI or Django
- PostgreSQL / Redis
- Docker & Kubernetes
- REST API design
- Experience with microservices
- Good communication skills"></textarea>
    </div>

    <div class="panel">
      <div class="panel-label">02 — Upload Resumes</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" multiple accept=".pdf,.docx,.doc"/>
        <div class="upload-icon">📄</div>
        <p><strong>Click or drag & drop</strong> resumes here</p>
        <p style="margin-top:6px;font-size:11px;">Supports PDF and DOCX · Multiple files allowed</p>
      </div>
      <div class="file-list" id="fileList"></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls-row">
    <div class="control-group">
      <label>Ollama Model</label>
      <select id="modelSelect">
        <option value="llama3">llama3</option>
        <option value="mistral">mistral</option>
        <option value="phi3">phi3</option>
        <option value="gemma2">gemma2</option>
        <option value="llama3.1">llama3.1</option>
        <option value="qwen2.5">qwen2.5</option>
      </select>
    </div>

    <div class="control-group">
      <label>Acceptance Threshold</label>
      <div class="threshold-display">
        <input type="range" id="thresholdSlider" min="50" max="95" value="80" step="5"/>
        <span class="threshold-val" id="thresholdVal">80%</span>
      </div>
    </div>

    <button class="run-btn" id="runBtn" onclick="runScreening()">
      <span>▶</span> Run Screening
    </button>
  </div>

  <!-- Progress -->
  <div class="progress-bar-wrap" id="progressWrap">
    <div class="progress-label" id="progressLabel">Initializing...</div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Error Banner -->
  <div class="error-banner" id="errorBanner"></div>

  <!-- Results -->
  <div id="resultsSection" style="display:none">
    <div class="results-header">
      <div class="results-title">Screening Results</div>
      <div class="stats-row" id="statsRow"></div>
    </div>

    <div class="filter-tabs">
      <button class="tab active" onclick="filterResults('all', this)">All</button>
      <button class="tab" onclick="filterResults('accepted', this)">✓ Accepted</button>
      <button class="tab" onclick="filterResults('rejected', this)">✗ Rejected</button>
    </div>

    <div class="result-cards" id="resultCards"></div>

    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🔍</div>
      <p>No results match this filter</p>
    </div>
  </div>

</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let allResults = [];
let selectedFiles = [];
let currentFilter = 'all';

// ─── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  checkStatus();
  loadModels();

  document.getElementById('thresholdSlider').addEventListener('input', (e) => {
    document.getElementById('thresholdVal').textContent = e.target.value + '%';
  });

  // Drag & Drop
  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    addFiles([...e.dataTransfer.files]);
  });

  document.getElementById('fileInput').addEventListener('change', (e) => {
    addFiles([...e.target.files]);
    e.target.value = '';
  });
});

// ─── Status Check ─────────────────────────────────────────────────────────────
async function checkStatus() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    if (d.running) {
      dot.className = 'status-dot online';
      txt.textContent = 'Ollama connected';
    } else {
      dot.className = 'status-dot offline';
      txt.textContent = 'Ollama offline';
    }
  } catch {
    document.getElementById('statusDot').className = 'status-dot offline';
    document.getElementById('statusText').textContent = 'Server offline';
  }
}

async function loadModels() {
  try {
    const r = await fetch('/api/models');
    const d = await r.json();
    if (d.models && d.models.length) {
      const sel = document.getElementById('modelSelect');
      sel.innerHTML = d.models.map(m =>
        `<option value="${m}">${m}</option>`
      ).join('');
    }
  } catch {}
}

// ─── File Handling ─────────────────────────────────────────────────────────────
function addFiles(files) {
  const valid = files.filter(f => /\.(pdf|docx|doc)$/i.test(f.name));
  const dupes = valid.filter(f => !selectedFiles.find(e => e.name === f.name));
  selectedFiles = [...selectedFiles, ...dupes];
  renderFileList();
}

function removeFile(idx) {
  selectedFiles.splice(idx, 1);
  renderFileList();
}

function renderFileList() {
  const list = document.getElementById('fileList');
  if (!selectedFiles.length) { list.innerHTML = ''; return; }
  list.innerHTML = selectedFiles.map((f, i) => {
    const ext = f.name.split('.').pop().toUpperCase();
    const size = (f.size / 1024).toFixed(0) + ' KB';
    return `
      <div class="file-chip">
        <div class="file-chip-name">
          <span class="file-ext">${ext}</span>
          <span>${f.name}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="color:var(--muted);font-size:11px">${size}</span>
          <button class="file-remove" onclick="removeFile(${i})">×</button>
        </div>
      </div>`;
  }).join('');
}

// ─── Screening ─────────────────────────────────────────────────────────────────
async function runScreening() {
  const requirements = document.getElementById('requirements').value.trim();
  if (!requirements) { showError('Please enter job requirements.'); return; }
  if (!selectedFiles.length) { showError('Please upload at least one resume.'); return; }

  hideError();
  setProgress(true, 'Sending resumes to AI screener...', 10);
  document.getElementById('runBtn').disabled = true;
  document.getElementById('resultsSection').style.display = 'none';

  const formData = new FormData();
  formData.append('requirements', requirements);
  formData.append('threshold', document.getElementById('thresholdSlider').value);
  formData.append('model', document.getElementById('modelSelect').value);
  selectedFiles.forEach(f => formData.append('resumes', f));

  // Animate progress while waiting
  let prog = 10;
  const interval = setInterval(() => {
    prog = Math.min(prog + 2, 88);
    setProgress(true, `Analyzing ${selectedFiles.length} resume(s) with AI...`, prog);
  }, 800);

  try {
    const r = await fetch('/api/screen', { method: 'POST', body: formData });
    clearInterval(interval);

    if (!r.ok) {
      const err = await r.json();
      throw new Error(err.error || 'Server error');
    }

    const data = await r.json();
    setProgress(true, 'Done!', 100);
    setTimeout(() => setProgress(false), 600);

    allResults = data.results;
    renderResults(data);

  } catch (e) {
    clearInterval(interval);
    setProgress(false);
    showError(e.message || 'An error occurred. Is Ollama running?');
  } finally {
    document.getElementById('runBtn').disabled = false;
  }
}

// ─── Render Results ────────────────────────────────────────────────────────────
function renderResults(data) {
  document.getElementById('resultsSection').style.display = 'block';

  // Stats
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-chip total">📋 ${data.total} total</div>
    <div class="stat-chip accepted">✓ ${data.accepted_count} accepted</div>
    <div class="stat-chip rejected">✗ ${data.rejected_count} rejected</div>
  `;

  filterResults(currentFilter);

  // Scroll to results
  setTimeout(() => document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function filterResults(filter, btn) {
  currentFilter = filter;

  // Update tabs
  if (btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  }

  const filtered = filter === 'all' ? allResults : allResults.filter(r => r.status === filter);
  const container = document.getElementById('resultCards');
  const empty = document.getElementById('emptyState');

  if (!filtered.length) {
    container.innerHTML = '';
    empty.classList.add('visible');
    return;
  }

  empty.classList.remove('visible');
  container.innerHTML = filtered.map((r, i) => buildCard(r, i)).join('');

  // Animate score rings
  setTimeout(() => {
    document.querySelectorAll('[data-score]').forEach(el => {
      const score = parseInt(el.dataset.score);
      const circle = el.querySelector('.fill');
      const circumference = 2 * Math.PI * 22;
      const offset = circumference - (score / 100) * circumference;
      circle.style.strokeDasharray = circumference;
      circle.style.strokeDashoffset = offset;

      const color = score >= 80 ? 'var(--score-high)' : score >= 60 ? 'var(--score-mid)' : 'var(--score-low)';
      circle.style.stroke = color;
      el.querySelector('.score-number').style.color = color;
    });

    // Animate match bars
    document.querySelectorAll('[data-fill]').forEach(el => {
      el.style.width = el.dataset.fill + '%';
      const val = parseInt(el.dataset.fill);
      el.style.background = val >= 80 ? 'var(--score-high)' : val >= 60 ? 'var(--score-mid)' : 'var(--score-low)';
    });
  }, 50);
}

function buildCard(r, i) {
  if (r.status === 'error') {
    return `<div class="result-card error" style="animation-delay:${i*0.08}s">
      <div class="card-header" onclick="toggleCard(this)">
        <div class="card-left">
          <div style="font-size:24px">⚠️</div>
          <div class="card-info">
            <h3>${r.filename}</h3>
            <p>${r.error}</p>
          </div>
        </div>
      </div>
    </div>`;
  }

  const score = r.score || 0;
  const circumference = 2 * Math.PI * 22;

  const strengths = (r.strengths || []).map(s => `<span class="tag strength">${s}</span>`).join('');
  const gaps = (r.gaps || []).map(g => `<span class="tag gap">${g}</span>`).join('');

  return `
  <div class="result-card ${r.status}" style="animation-delay:${i*0.08}s">
    <div class="card-header" onclick="toggleCard(this)">
      <div class="card-left">
        <div class="score-ring" data-score="${score}">
          <svg width="56" height="56" viewBox="0 0 56 56">
            <circle class="bg" cx="28" cy="28" r="22" stroke-width="4"/>
            <circle class="fill" cx="28" cy="28" r="22" stroke-width="4"
              style="stroke-dasharray:${circumference};stroke-dashoffset:${circumference}"/>
          </svg>
          <div class="score-number">${score}%</div>
        </div>
        <div class="card-info">
          <h3>${r.name || r.filename}</h3>
          <p>${r.email ? r.email + ' · ' : ''}${r.filename}</p>
        </div>
      </div>
      <div class="card-right">
        <span class="status-badge ${r.status}">${r.status === 'accepted' ? '✓ Accepted' : '✗ Rejected'}</span>
        <span class="chevron">⌄</span>
      </div>
    </div>

    <div class="card-body">
      <div class="summary-box">💬 ${r.summary || 'No summary available.'}</div>

      <div class="body-grid">
        <div class="body-section">
          <h4>Match Breakdown</h4>
          <div class="match-bar-row">
            <span class="match-bar-label">Overall</span>
            <div class="match-bar-track"><div class="match-bar-fill" data-fill="${r.score || 0}"></div></div>
            <span class="match-bar-val">${r.score || 0}%</span>
          </div>
          <div class="match-bar-row">
            <span class="match-bar-label">Skills</span>
            <div class="match-bar-track"><div class="match-bar-fill" data-fill="${r.skill_match || 0}"></div></div>
            <span class="match-bar-val">${r.skill_match || 0}%</span>
          </div>
          <div class="match-bar-row">
            <span class="match-bar-label">Experience</span>
            <div class="match-bar-track"><div class="match-bar-fill" data-fill="${r.experience_match || 0}"></div></div>
            <span class="match-bar-val">${r.experience_match || 0}%</span>
          </div>
        </div>

        <div class="body-section">
          <h4>Strengths</h4>
          <div class="tag-list">${strengths || '<span style="color:var(--muted);font-size:12px">None identified</span>'}</div>
          <h4 style="margin-top:16px">Gaps</h4>
          <div class="tag-list">${gaps || '<span style="color:var(--muted);font-size:12px">None identified</span>'}</div>
        </div>

        ${r.skills ? `
        <div class="body-section">
          <h4>Extracted Skills</h4>
          <div class="section-text">${r.skills}</div>
        </div>` : ''}

        ${r.experience ? `
        <div class="body-section">
          <h4>Experience Summary</h4>
          <div class="section-text">${r.experience}</div>
        </div>` : ''}
      </div>
    </div>
  </div>`;
}

function toggleCard(header) {
  const card = header.parentElement;
  card.classList.toggle('open');

  // Re-trigger animations when opening
  if (card.classList.contains('open')) {
    setTimeout(() => {
      card.querySelectorAll('[data-fill]').forEach(el => {
        el.style.width = el.dataset.fill + '%';
        const val = parseInt(el.dataset.fill);
        el.style.background = val >= 80 ? 'var(--score-high)' : val >= 60 ? 'var(--score-mid)' : 'var(--score-low)';
      });
    }, 50);
  }
}

// ─── UI Helpers ────────────────────────────────────────────────────────────────
function setProgress(visible, label, pct) {
  const wrap = document.getElementById('progressWrap');
  wrap.className = 'progress-bar-wrap' + (visible ? ' visible' : '');
  if (label) document.getElementById('progressLabel').textContent = label;
  if (pct !== undefined) document.getElementById('progressFill').style.width = pct + '%';
}

function showError(msg) {
  const b = document.getElementById('errorBanner');
  b.textContent = '⚠ ' + msg;
  b.classList.add('visible');
}

function hideError() {
  document.getElementById('errorBanner').classList.remove('visible');
}
</script>
</body>
</html>
